# ===== 目录配置 =====
workspace: workspace              # 用户项目目录（相对于本文件所在目录），默认 "."
data_dir: .agent_data     # 系统数据目录（相对于 workspace），默认 ".agent_data"

# ===== 用户配置 =====
llm:
  provider: deepseek
  model: deepseek-reasoner
  base_url: https://api.deepseek.com/v1

embedding:
  provider: ollama
  model: qwen3-embedding:0.6b
  base_url: http://127.0.0.1:11434

memory:
  provider: chroma
  path: chroma              # 相对于 data_dir 解析

user:
  id: user_001

# ===== 开发者调优（全部可选）=====
# plan:
#   max_adjustments: 3
#   max_clarification_rounds: 3
# agents:
#   max_handoffs: 3
#   max_tool_rounds: 3
# llm:
#   concurrency: 5
#   max_retries: 3
# tools:
#   max_output_length: 2000
# mcp:
#   config_path: mcp_servers.json
# skills:
#   dirs:                  # 相对于 workspace 解析；项目根 skills/ 始终自动包含
#     - skills/
#     - .agents/skills/
events:
    level: trace   # progress(流式回答+思考) | detail(+工具/Agent) | trace(+图/节点调试)
